name: Publish Channel Image

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Image channel to publish
        required: true
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/pauljoda/prismedia

jobs:
  build:
    name: Build and publish channel image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          channel="${{ inputs.channel }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${channel}"
            echo "${IMAGE_NAME}:${channel}-${version}"
            echo "${IMAGE_NAME}:${channel}-${version}-${short_sha}"
            if [ "$channel" = "release" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release contract
        run: node scripts/release/check-version.mjs

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/unified.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PRISMEDIA_CHANNEL=${{ inputs.channel }}
            PRISMEDIA_VERSION=${{ steps.tags.outputs.version }}
            PRISMEDIA_COMMIT=${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
